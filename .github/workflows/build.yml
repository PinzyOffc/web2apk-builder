name: Flutter Build

on:
  workflow_dispatch:
    inputs:
      projectName:
        description: 'Project Name'
        required: true
        type: string
      appName:
        description: 'App Display Name'
        required: true
        type: string
      packageName:
        description: 'Package Name (com.example.app)'
        required: true
        type: string
      buildType:
        description: 'Build Type'
        required: true
        type: string
      versionCode:
        description: 'Version Code'
        required: false
        default: '1'
        type: string
      versionName:
        description: 'Version Name'
        required: false
        default: '1.0.0'
        type: string
      releaseMode:
        description: 'Release Mode'
        required: false
        default: 'release'
        type: string
      jobId:
        description: 'Job ID'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔧 Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'gradle'

      - name: 🔄 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ hashFiles('**/pubspec.lock') }}
          cache-path: ${{ runner.tool_cache }}/flutter

      - name: 📥 Get Flutter Dependencies
        run: |
          flutter pub get
          flutter pub upgrade

      - name: 🔍 Flutter Doctor
        run: flutter doctor -v

      - name: 🎨 Update App Configuration
        run: |
          mkdir -p build_config
          cat > lib/generated/version.dart << EOF
          const String APP_NAME = '${{ inputs.appName }}';
          const String APP_VERSION = '${{ inputs.versionName }}';
          const int BUILD_NUMBER = ${{ inputs.versionCode }};
          const String PACKAGE_NAME = '${{ inputs.packageName }}';
          EOF

      - name: 📦 Build APK (${{ inputs.releaseMode }})
        run: |
          flutter build apk \
            --${{ inputs.releaseMode }} \
            --build-name=${{ inputs.versionName }} \
            --build-number=${{ inputs.versionCode }} \
            --target-platform=android-arm64 \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols

      - name: 📊 Check APK Size
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-${{ inputs.releaseMode }}.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE_BYTES=$(stat -c%s "$APK_PATH" 2>/dev/null || stat -f%z "$APK_PATH")
            SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
            echo "APK_SIZE=$SIZE_MB" >> $GITHUB_ENV
            echo "✅ APK Size: ${SIZE_MB}MB"
            
            # Size limit check (2000 MB)
            if (( $(echo "$SIZE_MB > 2000" | bc -l) )); then
              echo "❌ APK exceeds 2000MB limit"
              exit 1
            fi
          else
            echo "❌ APK not found!"
            exit 1
          fi

      - name: 📝 Rename APK
        run: |
          APK_SRC="build/app/outputs/flutter-apk/app-${{ inputs.releaseMode }}.apk"
          APK_DEST="build/app/outputs/flutter-apk/${{ inputs.appName }}.apk"
          if [ -f "$APK_SRC" ]; then
            mv "$APK_SRC" "$APK_DEST"
            ls -lh "$APK_DEST"
          fi

      - name: 📤 Upload APK as Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: build/app/outputs/flutter-apk/${{ inputs.appName }}.apk
          retention-days: 30

      - name: 📋 Generate Build Report
        if: always()
        run: |
          {
            echo "=== BUILD REPORT ==="
            echo "Job ID: ${{ inputs.jobId }}"
            echo "App Name: ${{ inputs.appName }}"
            echo "Package: ${{ inputs.packageName }}"
            echo "Version: ${{ inputs.versionName }} (Code: ${{ inputs.versionCode }})"
            echo "Build Status: ${{ job.status }}"
            echo "Build Time: $(date)"
            echo "APK Size: ${{ env.APK_SIZE }}MB"
            echo ""
            echo "=== FLUTTER INFO ==="
            flutter --version
            echo ""
            echo "=== SYSTEM INFO ==="
            uname -a
            java -version 2>&1 || true
          } > build_report.txt

      - name: 📤 Upload Build Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: build_report.txt
          retention-days: 7

      - name: 💾 Save Symbols
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols
          path: build/app/outputs/symbols
          retention-days: 7

      - name: ❌ Generate Error Log
        if: failure()
        run: |
          {
            echo "=== BUILD ERROR LOG ==="
            echo "Job ID: ${{ inputs.jobId }}"
            echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "Status: FAILED"
            echo ""
            echo "=== ERROR DETAILS ==="
            echo "App Name: ${{ inputs.appName }}"
            echo "Package: ${{ inputs.packageName }}"
            echo "Build Type: ${{ inputs.buildType }}"
            echo ""
            echo "=== FLUTTER DOCTOR ==="
            flutter doctor -v 2>&1 || echo "Flutter doctor failed"
            echo ""
            echo "=== GRADLE BUILD LOG ==="
            if [ -f ".gradle/build.log" ]; then
              tail -100 .gradle/build.log
            else
              echo "No gradle build log found"
            fi
          } > error_log.txt
          
          # Upload error log
          echo "Error log generated"

      - name: 📤 Upload Error Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_log.txt
          retention-days: 3

      - name: 🔔 Build Status Summary
        if: always()
        run: |
          echo "📊 Build Summary:"
          echo "- Status: ${{ job.status }}"
          echo "- Job ID: ${{ inputs.jobId }}"
          echo "- Duration: $(date -u +'%H:%M:%S')"
          echo "- APK Size: ${{ env.APK_SIZE }}MB"
          
