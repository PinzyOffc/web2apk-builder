name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build ID dari bot (buat matching run)'
        required: true
      app_name:
        description: 'Nama aplikasi'
        required: false
        default: 'MyApp'
      package_name:
        description: 'Package name (com.example.app)'
        required: false
      build_type:
        description: 'release atau debug'
        required: true
        default: 'release'
      release_id:
        description: 'GitHub Release ID yang menyimpan zip project'
        required: true

# run-name ini WAJIB ada build_id-nya, karena bot cari run lewat display_title
run-name: Build ${{ inputs.app_name }} [${{ inputs.build_id }}]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download project zip dari GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API_URL="https://api.github.com/repos/${{ github.repository }}/releases/${{ inputs.release_id }}/assets"
          echo "📥 Fetching assets dari release ID ${{ inputs.release_id }}..."
          
          # Pakai jq buat parse JSON dengan proper
          ZIP_URL=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$API_URL" | jq -r '.[] | select(.name | endswith(".zip")) | .browser_download_url' | head -1)
          
          if [ -z "$ZIP_URL" ] || [ "$ZIP_URL" = "null" ]; then
            echo "❌ Tidak ada .zip asset di release ini"
            curl -s -H "Authorization: token $GITHUB_TOKEN" "$API_URL" | jq .
            exit 1
          fi
          
          echo "🔗 Download URL: $ZIP_URL"
          curl -L -H "Authorization: token $GITHUB_TOKEN" "$ZIP_URL" -o project.zip -w "\n%{http_code}\n"
          
          if [ ! -f project.zip ] || [ ! -s project.zip ]; then
            echo "❌ Gagal download atau file kosong"
            exit 1
          fi
          
          echo "✅ Download sukses, ukuran: $(ls -lh project.zip | awk '{print $5}')"

      - name: Extract project
        run: unzip -o -q project.zip -d project

      - name: Detect project type (flutter / android)
        id: detect
        run: |
          if [ -f "project/pubspec.yaml" ]; then
            echo "type=flutter" >> "$GITHUB_OUTPUT"
          elif [ -f "project/build.gradle" ] || [ -f "project/build.gradle.kts" ]; then
            echo "type=android" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Tidak ketemu pubspec.yaml atau build.gradle di root project" >&2
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ---------- Kalau project-nya Flutter ----------
      - name: Set up Flutter
        if: steps.detect.outputs.type == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Flutter APK
        if: steps.detect.outputs.type == 'flutter'
        working-directory: project
        run: |
          flutter pub get
          flutter build apk --${{ inputs.build_type }}

      # ---------- Kalau project-nya Android/Gradle ----------
      - name: Set up Android SDK
        if: steps.detect.outputs.type == 'android'
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        if: steps.detect.outputs.type == 'android'
        working-directory: project
        run: |
          chmod +x gradlew
          if [ "${{ inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon
          else
            ./gradlew assembleDebug --no-daemon
          fi

      # ---------- Ambil hasil APK, apapun tipe project-nya ----------
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: |
            project/**/build/app/outputs/flutter-apk/*.apk
            project/**/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 1
        with:
          distribution: temurin
          java-version: '17'

      # ---------- Kalau project-nya Flutter ----------
      - name: Set up Flutter
        if: steps.detect.outputs.type == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Flutter APK
        if: steps.detect.outputs.type == 'flutter'
        working-directory: project
        run: |
          flutter pub get
          flutter build apk --${{ inputs.build_type }}

      # ---------- Kalau project-nya Android/Gradle ----------
      - name: Set up Android SDK
        if: steps.detect.outputs.type == 'android'
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        if: steps.detect.outputs.type == 'android'
        working-directory: project
        run: |
          chmod +x gradlew
          if [ "${{ inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon
          else
            ./gradlew assembleDebug --no-daemon
          fi

      # ---------- Ambil hasil APK, apapun tipe project-nya ----------
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: |
            project/**/build/app/outputs/flutter-apk/*.apk
            project/**/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 1
      - name: Set up Android SDK
        if: steps.detect.outputs.type == 'android'
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        if: steps.detect.outputs.type == 'android'
        working-directory: project
        run: |
          chmod +x gradlew
          if [ "${{ inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon
          else
            ./gradlew assembleDebug --no-daemon
          fi

      # ---------- Ambil hasil APK, apapun tipe project-nya ----------
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: |
            project/**/build/app/outputs/flutter-apk/*.apk
            project/**/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 1
