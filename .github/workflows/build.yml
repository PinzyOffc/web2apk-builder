name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build ID dari bot (buat matching run)'
        required: true
      app_name:
        description: 'Nama aplikasi'
        required: false
        default: 'MyApp'
      package_name:
        description: 'Package name (com.example.app)'
        required: false
      build_type:
        description: 'release atau debug'
        required: true
        default: 'release'
      zip_path:
        description: 'Path zip di repo (misal: builds/<id>.zip)'
        required: true

# run-name ini WAJIB ada build_id-nya, karena bot cari run lewat display_title
run-name: Build ${{ inputs.app_name }} [${{ inputs.build_id }}]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (ambil file zip dari repo)
        uses: actions/checkout@v4

      - name: Verify zip exists
        run: |
          if [ ! -f "${{ inputs.zip_path }}" ]; then
            echo "❌ File tidak ditemukan: ${{ inputs.zip_path }}"
            ls -la builds/ || echo "Folder builds tidak ada"
            exit 1
          fi
          echo "✅ Zip found: $(ls -lh '${{ inputs.zip_path }}' | awk '{print $5}')"

      - name: Extract project
        run: unzip -o -q "${{ inputs.zip_path }}" -d project

      - name: Detect project type (flutter / android)
        id: detect
        run: |
          if [ -f "project/pubspec.yaml" ]; then
            echo "type=flutter" >> "$GITHUB_OUTPUT"
          elif [ -f "project/build.gradle" ] || [ -f "project/build.gradle.kts" ]; then
            echo "type=android" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Tidak ketemu pubspec.yaml atau build.gradle di root project" >&2
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ---------- Kalau project-nya Flutter ----------
      - name: Set up Flutter
        if: steps.detect.outputs.type == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Flutter APK
        if: steps.detect.outputs.type == 'flutter'
        working-directory: project
        run: |
          flutter pub get
          flutter build apk --${{ inputs.build_type }}

      # ---------- Kalau project-nya Android/Gradle ----------
      - name: Set up Android SDK
        if: steps.detect.outputs.type == 'android'
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        if: steps.detect.outputs.type == 'android'
        working-directory: project
        run: |
          chmod +x gradlew
          if [ "${{ inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease --no-daemon
          else
            ./gradlew assembleDebug --no-daemon
          fi

      # ---------- Ambil hasil APK, apapun tipe project-nya ----------
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: |
            project/**/build/app/outputs/flutter-apk/*.apk
            project/**/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 1
          
